name: ICT-Authority-cabinet

topology:
  nodes:


    PDU:
      kind: linux
      image: alpine:latest
      labels:
        role: power-distribution
        outlets: "10"

    UPS:
      kind: linux
      image: alpine:latest
      labels:
        role: power-source
        capacity: "3000VA"

    CORE-switch:
      kind: ceos
      image: docker.io/harsha258/ceos:4.32.0F


    patch-panel:
      kind: linux
      image: alpine:latest
      
    ODF:
      kind: linux
      image: alpine:latest


   

  links:
  
    - endpoints: ["CORE-switch:eth5", "patch-panel:eth1"]
    
    - endpoints: ["ODF:eth1", "CORE-switch:eth1"]
    - endpoints: ["UPS:eth1", "PDU:eth1"]
    - endpoints: ["PDU:eth2", "CORE-switch:eth24"]